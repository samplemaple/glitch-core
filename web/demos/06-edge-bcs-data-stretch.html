<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>故障艺术 Demo #6 — 边缘检测 · 亮度/对比 · 数据损坏 · 拉伸撕裂</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d0d0d;color:#ccc;display:flex;height:100vh;overflow:hidden}
.preview-panel{flex:1;display:flex;align-items:center;justify-content:center;background:#111;position:relative;min-width:0}
.preview-panel canvas{max-width:100%;max-height:100%;object-fit:contain}
.drop-zone{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;border:2px dashed #333;border-radius:8px;margin:20px;color:#555;font-size:18px;cursor:pointer;transition:border-color .2s}
.drop-zone:hover,.drop-zone.drag-over{border-color:#0af;color:#0af}
.ctrl-panel{width:340px;background:#1a1a1a;display:flex;flex-direction:column;overflow-y:auto;border-left:1px solid #2a2a2a}
.panel-header{padding:16px 20px;border-bottom:1px solid #2a2a2a;display:flex;justify-content:space-between;align-items:center}
.panel-header h2{font-size:16px;color:#fff}
.btn{padding:6px 14px;border-radius:6px;border:none;cursor:pointer;font-size:13px}
.btn-primary{background:#0af;color:#000;font-weight:600}.btn-primary:hover{background:#08d}
.effect-group{padding:16px 20px;border-bottom:1px solid #222}
.effect-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.effect-header label{font-size:14px;color:#fff;font-weight:500}
.toggle{position:relative;display:inline-block;width:40px;height:22px}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;cursor:pointer;inset:0;background:#333;border-radius:22px;transition:.2s}
.toggle-slider:before{content:'';position:absolute;height:16px;width:16px;left:3px;bottom:3px;background:#666;border-radius:50%;transition:.2s}
.toggle input:checked+.toggle-slider{background:#0af}
.toggle input:checked+.toggle-slider:before{transform:translateX(18px);background:#000}
.param-row{margin-bottom:10px}.param-row:last-child{margin-bottom:0}
.param-label{display:flex;justify-content:space-between;font-size:11px;color:#888;margin-bottom:3px}
.param-label span:last-child{color:#0af;font-family:monospace}
input[type=range]{-webkit-appearance:none;width:100%;height:4px;background:#333;border-radius:2px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;background:#0af;border-radius:50%;cursor:pointer}
select{width:100%;padding:4px 8px;background:#222;color:#ccc;border:1px solid #333;border-radius:4px;font-size:12px;outline:none}select:focus{border-color:#0af}
.noise-info{font-size:11px;color:#555;padding:8px 20px}
</style></head><body>
<div class="preview-panel" id="pp"><div class="drop-zone" id="dz">📁 拖拽图片到此处，或点击上传</div><canvas id="cv"></canvas></div>
<div class="ctrl-panel">
<div class="panel-header"><h2>🎛️ Glitch Art Demo #6</h2><button class="btn btn-primary" id="btnDL">下载 PNG</button></div>
<!-- Edge Detect -->
<div class="effect-group"><div class="effect-header"><label>边缘检测 · Edge Detect</label><label class="toggle"><input type="checkbox" id="f1"><span class="toggle-slider"></span></label></div>
<div class="param-row"><div class="param-label"><span>强度 · Intensity</span><span id="v1">1.00</span></div><input type="range" min="0" max="3" step="0.1" value="1" id="f1i"></div>
<div class="param-row"><select id="f1m"><option value="0" selected>Sobel 黑白线稿</option><option value="1">边缘叠加到原图</option><option value="2">仅边缘（白底）</option></select></div>
</div>
<!-- Brightness/Contrast/Saturation -->
<div class="effect-group"><div class="effect-header"><label>亮度/对比/饱和 · BCS Adjust</label><label class="toggle"><input type="checkbox" id="f2" checked><span class="toggle-slider"></span></label></div>
<div class="param-row"><div class="param-label"><span>亮度 · Brightness</span><span id="v2">0.00</span></div><input type="range" min="-0.5" max="0.5" step="0.01" value="0" id="f2b"></div>
<div class="param-row"><div class="param-label"><span>对比度 · Contrast</span><span id="v3">1.10</span></div><input type="range" min="0.5" max="2" step="0.01" value="1.1" id="f2c"></div>
<div class="param-row"><div class="param-label"><span>饱和度 · Saturation</span><span id="v4">1.00</span></div><input type="range" min="0" max="2" step="0.01" value="1" id="f2s"></div>
</div>
<!-- Data Glitch -->
<div class="effect-group"><div class="effect-header"><label>数据损坏 · Data Glitch</label><label class="toggle"><input type="checkbox" id="f3"><span class="toggle-slider"></span></label></div>
<div class="param-row"><div class="param-label"><span>强度 · Intensity</span><span id="v5">0.30</span></div><input type="range" min="0" max="1" step="0.01" value="0.3" id="f3i"></div>
<div class="param-row"><div class="param-label"><span>块大小 · Block Size</span><span id="v6">16</span></div><input type="range" min="4" max="64" step="1" value="16" id="f3b"></div>
<div class="param-row"><div class="param-label"><span>种子 · Seed</span><span id="v7">42</span></div><input type="range" min="1" max="999" step="1" value="42" id="f3sd"></div>
</div>
<!-- Stretch -->
<div class="effect-group"><div class="effect-header"><label>拉伸撕裂 · Stretch</label><label class="toggle"><input type="checkbox" id="f4"><span class="toggle-slider"></span></label></div>
<div class="param-row"><div class="param-label"><span>强度 · Intensity</span><span id="v8">0.30</span></div><input type="range" min="0" max="1" step="0.01" value="0.3" id="f4i"></div>
<div class="param-row"><div class="param-label"><span>方向 · Direction</span></div><select id="f4d"><option value="0" selected>水平 · Horizontal</option><option value="1">垂直 · Vertical</option></select></div>
</div>
<div class="noise-info">💡 收尾四件套。边缘检测做素描风，BCS修正曝光，数据损坏模拟文件损坏，拉伸制造撕裂感。</div>
</div>
<script src="shared/glitch-engine.js"></script>
<script src="shared/demo-runner.js"></script>
<script>
const C='precision mediump float;varying vec2 v_texCoord;uniform sampler2D u_texture;uniform vec2 u_resolution;';
const F1=C+`uniform float u_intensity;uniform int u_mode;
// Sobel 3×3 边缘检测，边界处回退原像素
// Sobel 3×3 edge detect, fallback at borders
float lum(vec3 c){return dot(c,vec3(0.299,0.587,0.114));}
void main(){
  vec2 ps=1.0/u_resolution;
  // 边界保护：距离边缘1像素内回退 / Edge guard: fallback within 1px of edge
  if(v_texCoord.x<ps.x||v_texCoord.x>1.0-ps.x||v_texCoord.y<ps.y||v_texCoord.y>1.0-ps.y){
    gl_FragColor=texture2D(u_texture,v_texCoord);return;
  }
  float tl=lum(texture2D(u_texture,v_texCoord+vec2(-ps.x,ps.y)).rgb);float t=lum(texture2D(u_texture,v_texCoord+vec2(0,ps.y)).rgb);float tr=lum(texture2D(u_texture,v_texCoord+vec2(ps.x,ps.y)).rgb);
float l=lum(texture2D(u_texture,v_texCoord+vec2(-ps.x,0)).rgb);float r=lum(texture2D(u_texture,v_texCoord+vec2(ps.x,0)).rgb);
float bl=lum(texture2D(u_texture,v_texCoord+vec2(-ps.x,-ps.y)).rgb);float b=lum(texture2D(u_texture,v_texCoord+vec2(0,-ps.y)).rgb);float br=lum(texture2D(u_texture,v_texCoord+vec2(ps.x,-ps.y)).rgb);
float gx=-tl-2.0*l-bl+tr+2.0*r+br;float gy=-tl-2.0*t-tr+bl+2.0*b+br;float edge=sqrt(gx*gx+gy*gy)*u_intensity;
// 仅叠加模式需要中心像素采样 / center pixel only needed for overlay mode
if(u_mode==0)gl_FragColor=vec4(vec3(1.0-edge),1.0);
else if(u_mode==1){vec4 orig=texture2D(u_texture,v_texCoord);gl_FragColor=vec4(mix(orig.rgb,vec3(0),edge*0.8),orig.a);}
else gl_FragColor=vec4(vec3(edge),1.0);}`;
const F2=C+`uniform float u_brightness,u_contrast,u_saturation;
vec3 adjustSaturation(vec3 c,float s){float l=dot(c,vec3(0.2126,0.7152,0.0722));return mix(vec3(l),c,s);}
void main(){vec4 c=texture2D(u_texture,v_texCoord);c.rgb+=u_brightness;c.rgb=(c.rgb-0.5)*u_contrast+0.5;c.rgb=adjustSaturation(c.rgb,u_saturation);gl_FragColor=c;}`;
const F3=C+`uniform float u_intensity,u_block;uniform int u_seed;
// 种子通过乘法放大到可感知范围 / Seed scaled up for visible variation
float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453+float(u_seed)*123.456);}
void main(){vec2 uv=v_texCoord;vec2 blockUV=floor(uv*u_resolution/u_block);float h=hash(blockUV);if(h<u_intensity){float dx=(hash(blockUV+0.5)-0.5)*0.15;float dy=(hash(blockUV+1.0)-0.5)*0.15;uv+=vec2(dx,dy);uv=clamp(uv,0.0,1.0);}
gl_FragColor=texture2D(u_texture,uv);}`;
const F4=C+`uniform float u_intensity;uniform int u_direction;
void main(){vec2 uv=v_texCoord;if(u_direction==0){float band=floor(uv.y*u_resolution.y/8.0);float off=(fract(sin(band*127.1)*43758.54)-0.5)*u_intensity*0.05;uv.x+=off;}else{float band=floor(uv.x*u_resolution.x/8.0);float off=(fract(sin(band*311.7)*43758.54)-0.5)*u_intensity*0.05;uv.y+=off;}
uv=clamp(uv,0.0,1.0);gl_FragColor=texture2D(u_texture,uv);}`;
GlitchDemoRunner.init({
  canvasId: 'cv',
  dropZoneId: 'dz',
  previewPanelId: 'pp',
  downloadButtonId: 'btnDL',
  valueBindings: {
    f1i: 'v1',
    f2b: 'v2',
    f2c: 'v3',
    f2s: 'v4',
    f3i: 'v5',
    f3b: 'v6',
    f3sd: 'v7',
    f4i: 'v8'
  },
  controlSelector: 'input[type=range],select,input[type=checkbox]',
  buildEffects: ({ checked, float, int }) => {
    const effects = [];
    if (checked('f1')) {
      effects.push({
        shader: F1,
        uniforms: {
          u_intensity: float('f1i'),
          u_mode: int('f1m')
        }
      });
    }
    if (checked('f2')) {
      effects.push({
        shader: F2,
        uniforms: {
          u_brightness: float('f2b'),
          u_contrast: float('f2c'),
          u_saturation: float('f2s')
        }
      });
    }
    if (checked('f3')) {
      effects.push({
        shader: F3,
        uniforms: {
          u_intensity: float('f3i'),
          u_block: float('f3b'),
          u_seed: int('f3sd')
        }
      });
    }
    if (checked('f4')) {
      effects.push({
        shader: F4,
        uniforms: {
          u_intensity: float('f4i'),
          u_direction: int('f4d')
        }
      });
    }
    return effects;
  }
});
</script></body></html>
