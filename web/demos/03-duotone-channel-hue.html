<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>故障艺术 Demo #3 — 双色调 · 通道反转 · 色相扭曲</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d0d0d;color:#ccc;display:flex;height:100vh;overflow:hidden}
.preview-panel{flex:1;display:flex;align-items:center;justify-content:center;background:#111;position:relative;min-width:0}
.preview-panel canvas{max-width:100%;max-height:100%;object-fit:contain}
.drop-zone{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;border:2px dashed #333;border-radius:8px;margin:20px;color:#555;font-size:18px;cursor:pointer;transition:border-color .2s}
.drop-zone:hover,.drop-zone.drag-over{border-color:#ff0;color:#ff0}
.ctrl-panel{width:340px;background:#1a1a1a;display:flex;flex-direction:column;overflow-y:auto;border-left:1px solid #2a2a2a}
.panel-header{padding:16px 20px;border-bottom:1px solid #2a2a2a;display:flex;justify-content:space-between;align-items:center}
.panel-header h2{font-size:16px;color:#fff}
.btn{padding:6px 14px;border-radius:6px;border:none;cursor:pointer;font-size:13px}
.btn-primary{background:#ff0;color:#000;font-weight:600}.btn-primary:hover{background:#dd0}
.effect-group{padding:16px 20px;border-bottom:1px solid #222}
.effect-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.effect-header label{font-size:14px;color:#fff;font-weight:500}
.toggle{position:relative;display:inline-block;width:40px;height:22px}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;cursor:pointer;inset:0;background:#333;border-radius:22px;transition:.2s}
.toggle-slider:before{content:'';position:absolute;height:16px;width:16px;left:3px;bottom:3px;background:#666;border-radius:50%;transition:.2s}
.toggle input:checked+.toggle-slider{background:#ff0}
.toggle input:checked+.toggle-slider:before{transform:translateX(18px);background:#000}
.param-row{margin-bottom:10px}.param-row:last-child{margin-bottom:0}
.param-label{display:flex;justify-content:space-between;font-size:11px;color:#888;margin-bottom:3px}
.param-label span:last-child{color:#ff0;font-family:monospace}
input[type=range]{-webkit-appearance:none;width:100%;height:4px;background:#333;border-radius:2px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;background:#ff0;border-radius:50%;cursor:pointer}
select{width:100%;padding:4px 8px;background:#222;color:#ccc;border:1px solid #333;border-radius:4px;font-size:12px;outline:none}select:focus{border-color:#ff0}
.noise-info{font-size:11px;color:#555;padding:8px 20px}
</style></head><body>
<div class="preview-panel" id="pp"><div class="drop-zone" id="dz">📁 拖拽图片到此处，或点击上传</div><canvas id="cv"></canvas></div>
<div class="ctrl-panel">
<div class="panel-header"><h2>🎛️ Glitch Art Demo #3</h2><button class="btn btn-primary" id="btnDL">下载 PNG</button></div>
<!-- Duotone -->
<div class="effect-group"><div class="effect-header"><label>双色调 · Duotone</label><label class="toggle"><input type="checkbox" id="f1" checked><span class="toggle-slider"></span></label></div>
<div class="param-row"><div class="param-label"><span>高光色 · Highlight</span></div><input type="color" value="#ffdd00" id="f1hi" style="width:100%;height:30px;background:#222;border:1px solid #333;border-radius:4px"></div>
<div class="param-row"><div class="param-label"><span>阴影色 · Shadow</span></div><input type="color" value="#2200aa" id="f1sh" style="width:100%;height:30px;background:#222;border:1px solid #333;border-radius:4px"></div>
<div class="param-row"><div class="param-label"><span>混合 · Blend</span><span id="v1">0.50</span></div><input type="range" min="0" max="1" step="0.01" value="0.5" id="f1bl"></div>
</div>
<!-- Channel Invert -->
<div class="effect-group"><div class="effect-header"><label>通道反转 · Channel Invert</label><label class="toggle"><input type="checkbox" id="f2"><span class="toggle-slider"></span></label></div>
<div class="param-row"><select id="f2ch"><option value="0">全部 · All</option><option value="1" selected>仅红色 · Red only</option><option value="2">仅绿色 · Green only</option><option value="3">仅蓝色 · Blue only</option></select></div>
</div>
<!-- Hue Shift -->
<div class="effect-group"><div class="effect-header"><label>色相扭曲 · Hue Shift</label><label class="toggle"><input type="checkbox" id="f3"><span class="toggle-slider"></span></label></div>
<div class="param-row"><div class="param-label"><span>偏移量 · Shift</span><span id="v2">0.50</span></div><input type="range" min="0" max="1" step="0.01" value="0.5" id="f3sh"></div>
<div class="param-row"><div class="param-label"><span>彩虹化 · Rainbow</span><span id="v3">0.00</span></div><input type="range" min="0" max="1" step="0.01" value="0" id="f3rb"></div>
</div>
<div class="noise-info">💡 色彩破坏三件套。双色调做海报风，反转做负片效果，色相做赛博迷幻。</div>
</div>
<script src="shared/glitch-engine.js"></script>
<script src="shared/demo-runner.js"></script>
<script>
const C='precision mediump float;varying vec2 v_texCoord;uniform sampler2D u_texture;uniform vec2 u_resolution;';
const F1=C+`uniform vec3 u_hi,u_sh;uniform float u_blend;
// 基于亮度的双色调映射：lerp(阴影色, 高光色, 亮度)
// Luminance-based duotone mapping: lerp(shadow, highlight, luminance)
float lum(vec3 c){return dot(c,vec3(0.299,0.587,0.114));}
void main(){vec4 c=texture2D(u_texture,v_texCoord);float l=lum(c.rgb);gl_FragColor=vec4(mix(u_sh,u_hi,l)*u_blend+c.rgb*(1.0-u_blend),c.a);}`;
const F2=C+`uniform int u_ch;void main(){vec4 c=texture2D(u_texture,v_texCoord);if(u_ch==0)c.rgb=1.0-c.rgb;else if(u_ch==1)c.r=1.0-c.r;else if(u_ch==2)c.g=1.0-c.g;else c.b=1.0-c.b;gl_FragColor=c;}`;
const F3=C+`uniform float u_shift,u_rainbow;vec3 rgb2hsv(vec3 c){vec4 K=vec4(0.0,-1.0/3.0,2.0/3.0,-1.0);vec4 p=c.g<c.b?vec4(c.bg,K.wz):vec4(c.gb,K.xy);vec4 q=c.r<p.x?vec4(p.xyw,c.r):vec4(c.r,p.yzx);float d=q.x-min(q.w,q.y),e=1e-10;return vec3(abs(q.z+(q.w-q.y)/(6.0*d+e)),d/(q.x+e),q.x);}
vec3 hsv2rgb(vec3 c){vec4 K=vec4(1.0,2.0/3.0,1.0/3.0,3.0);vec3 p=abs(fract(c.xxx+K.xyz)*6.0-K.www);return c.z*mix(K.xxx,clamp(p-K.xxx,0.0,1.0),c.y);}
void main(){vec4 c=texture2D(u_texture,v_texCoord);vec3 hsv=rgb2hsv(c.rgb);hsv.x=fract(hsv.x+u_shift+u_rainbow*(v_texCoord.y-0.25));gl_FragColor=vec4(hsv2rgb(hsv),c.a);}`;
GlitchDemoRunner.init({
  canvasId: 'cv',
  dropZoneId: 'dz',
  previewPanelId: 'pp',
  downloadButtonId: 'btnDL',
  valueBindings: {
    f1bl: 'v1',
    f3sh: 'v2',
    f3rb: 'v3'
  },
  controlSelector: 'input[type=range],select,input[type=color],input[type=checkbox]',
  buildEffects: ({ checked, color3, float, int }) => {
    const effects = [];
    if (checked('f1')) {
      effects.push({
        shader: F1,
        uniforms: {
          u_hi: color3('f1hi'),
          u_sh: color3('f1sh'),
          u_blend: float('f1bl')
        }
      });
    }
    if (checked('f2')) {
      effects.push({
        shader: F2,
        uniforms: { u_ch: int('f2ch') }
      });
    }
    if (checked('f3')) {
      effects.push({
        shader: F3,
        uniforms: {
          u_shift: float('f3sh'),
          u_rainbow: float('f3rb')
        }
      });
    }
    return effects;
  }
});
</script></body></html>
